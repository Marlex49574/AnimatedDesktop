name: Lint install script

on:
  push:
    paths:
      - 'install.ps1'
      - '.github/workflows/lint-install-script.yml'
  pull_request:
    paths:
      - 'install.ps1'
      - '.github/workflows/lint-install-script.yml'

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error,Warning
          if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
              exit 1
          }
          Write-Host "PSScriptAnalyzer: no issues found." -ForegroundColor Green

      - name: Validate script syntax
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path install.ps1).Path,
              [ref]$null,
              [ref]$errors
          )
          if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
          }
          Write-Host "Syntax check passed." -ForegroundColor Green
